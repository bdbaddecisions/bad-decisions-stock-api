  <!-- BREVO SUBMIT -->
  <script>
const form = document.getElementById("brevo-form");
const successMessage = document.getElementById("success-message");
const halo = document.getElementById("halo");
const previewLink = document.getElementById("preview-link");
const sourceInput = document.getElementById("signup-source");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const params = new URLSearchParams(window.location.search);

let source = params.get("utm_source");

if (!source) {
  const ref = document.referrer.toLowerCase();

  if (ref.includes("instagram")) {
    source = "instagram";
  } else if (ref.includes("tiktok")) {
    source = "tiktok";
  } else if (ref.includes("google")) {
    source = "google";
  } else if (ref.includes("facebook")) {
    source = "facebook";
  } else {
    source = "direct";
  }
}

source = source.replace(/[^a-zA-Z0-9_-]/g, "").toLowerCase();

sourceInput.value = source;

  const formData = new FormData(form);

  gtag("event", "waitlist_signup", {
    source: source,
    value: 1,
    transport_type: "beacon"
  });

  fetch("/.netlify/functions/subscribe", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    email: form.querySelector("input[name='EMAIL']").value,
    source: source
  })
});

  form.classList.add("opacity-0");

  setTimeout(() => {
    form.style.display = "none";
    halo.classList.add("no-halo");
    successMessage.classList.remove("hidden");
  }, 500);

  setTimeout(() => {
    window.location.href = "index.html";
  }, 5000);
});
</script>
